<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Card Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F1720;color:#E8EDF2;
       padding:18px 16px 60px;min-height:100dvh;-webkit-font-smoothing:antialiased}
  h1{font-size:19px;margin-bottom:4px}
  .sub{font-size:12.5px;opacity:.55;margin-bottom:18px}
  .box{background:#18222E;border:1px solid #263447;border-radius:14px;padding:16px;margin-bottom:14px}
  label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin:12px 0 5px}
  label:first-child{margin-top:0}
  input,select,textarea{width:100%;padding:11px 12px;border-radius:9px;border:1px solid #2C3B4F;
    background:#0F1720;color:#E8EDF2;font-size:16px;font-family:inherit}
  input:focus,textarea:focus{outline:none;border-color:#4C8DF6}
  textarea{min-height:64px;resize:vertical}
  .two{display:flex;gap:10px}.two>div{flex:1}
  button{width:100%;padding:14px;border-radius:10px;border:none;background:#4C8DF6;color:#fff;
    font-size:15px;font-weight:600;font-family:inherit;margin-top:16px;cursor:pointer}
  button:active{opacity:.85}
  button.ghost{background:transparent;border:1px solid #2C3B4F;color:#9FB3C8;margin-top:8px}
  button.danger{background:#8B2233;margin-top:8px}
  .msg{padding:11px 13px;border-radius:9px;font-size:13.5px;margin-top:12px;display:none}
  .ok{background:#12351F;color:#7BE0A2;display:block}
  .err{background:#3A1620;color:#FF9AA8;display:block}
  .row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #24303F}
  .row:last-child{border-bottom:none}
  .row .nm{flex:1;font-size:14.5px}
  .row .sl{font-size:11.5px;opacity:.5}
  .row a{color:#4C8DF6;font-size:12.5px;text-decoration:none;padding:6px 10px;border:1px solid #2C3B4F;border-radius:7px}
  .swatch{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .swatch button{width:auto;flex:0 0 auto;margin:0;padding:7px 11px;font-size:11.5px;font-weight:500;
    border-radius:7px;background:#0F1720;border:1px solid #2C3B4F;color:#C3D0DE}
  .live{margin-top:14px;padding:13px;background:#0F1720;border:1px dashed #2C3B4F;border-radius:10px;text-align:center;display:none}
  .live a{color:#4C8DF6;font-size:14px;word-break:break-all;text-decoration:none}
  .live img{margin-top:12px;border-radius:8px;background:#fff;padding:8px}
  .hint{font-size:11.5px;opacity:.45;margin-top:5px;line-height:1.5}
  img.prev{width:64px;height:64px;object-fit:cover;border-radius:50%;border:2px solid #2C3B4F;margin-top:10px}
</style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="login">
  <h1>Card Admin</h1>
  <p class="sub">Sign in to add or edit cards.</p>
  <div class="box">
    <label>Email</label><input id="em" type="email" autocomplete="username" />
    <label>Password</label><input id="pw" type="password" autocomplete="current-password" />
    <button onclick="signIn()">Sign in</button>
    <div id="lmsg" class="msg"></div>
  </div>
</div>

<!-- ─── EDITOR ─── -->
<div id="panel" style="display:none">
  <h1>Card Admin</h1>
  <p class="sub" id="who"></p>

  <div class="box">
    <label>Card URL name (slug)</label>
    <input id="slug" placeholder="rahul" autocapitalize="none" />
    <p class="hint">Becomes <b id="urlpreview">/rahul</b> — lowercase, no spaces.</p>

    <label>Full name</label><input id="name" placeholder="Rahul Sharma" />
    <label>Role / Designation</label><input id="role" placeholder="Founder · Acme Travel" />

    <div class="two">
      <div><label>Brand colour</label><input id="brand" value="#0D1B2A" /></div>
      <div><label>Accent</label><input id="gold" value="#C9A84C" /></div>
    </div>
    <div class="swatch">
      <button onclick="setTheme('#0D1B2A','#C9A84C')">Navy</button>
      <button onclick="setTheme('#1B4D3E','#C9A84C')">Green</button>
      <button onclick="setTheme('#4F1219','#C9A15D')">Maroon</button>
      <button onclick="setTheme('#1C1C1E','#D4AF37')">Charcoal</button>
      <button onclick="setTheme('#0E3B43','#E0B973')">Teal</button>
    </div>

    <label>Photo</label>
    <input id="photofile" type="file" accept="image/*" onchange="pickPhoto(event)" />
    <img id="prev" class="prev" style="display:none" />
    <p class="hint">Taken from your phone works fine. Uploads automatically on save.</p>

    <label>Face position (if the crop looks off)</label>
    <input id="photoPos" value="50% 30%" />
    <p class="hint">"50% 30%" — lower 2nd number shows more of the top of the photo.</p>

    <label>Brand name (typed)</label><input id="wordmark" placeholder="ACME TRAVEL" />
    <label>Tagline</label><input id="tagline" placeholder="Journeys worth telling" />

    <div class="two">
      <div><label>Phone (dial)</label><input id="phone" placeholder="+919876543210" /></div>
      <div><label>Phone (shown)</label><input id="phoneShow" placeholder="+91 98765 43210" /></div>
    </div>
    <label>Email</label><input id="email" type="email" placeholder="rahul@acme.com" />
    <div class="two">
      <div><label>Website</label><input id="website" placeholder="https://acme.com" /></div>
      <div><label>Shown as</label><input id="websiteShow" placeholder="acme.com" /></div>
    </div>
    <label>Location</label><input id="location" placeholder="Mumbai, India" />
    <label>Maps link</label><input id="maps" placeholder="https://maps.google.com/..." />

    <label>Instagram</label><input id="instagram" placeholder="https://instagram.com/..." />
    <label>Facebook</label><input id="facebook" placeholder="https://facebook.com/..." />
    <label>LinkedIn</label><input id="linkedin" placeholder="https://linkedin.com/in/..." />
    <label>WhatsApp number</label><input id="whatsapp" placeholder="919876543210" />

    <label>Services heading</label><input id="servicesTitle" value="What We Do" />
    <label>Services (one line per row)</label>
    <textarea id="services" placeholder="Tours · Visas · Hotels&#10;Corporate Travel"></textarea>
    <label>Company (for saved contact)</label><input id="org" placeholder="Acme Travel" />

    <button onclick="save()">Save card</button>
    <button class="ghost" onclick="clearForm()">New / clear form</button>
    <div id="msg" class="msg"></div>

    <div id="live" class="live">
      <a id="liveurl" target="_blank"></a><br/>
      <img id="qr" width="150" height="150" alt="QR" />
      <p class="hint">Write this URL to the NFC sticker, or let them scan the QR.</p>
    </div>
  </div>

  <div class="box">
    <label style="margin-bottom:10px">Existing cards</label>
    <div id="list"></div>
    <button class="ghost" onclick="loadList()">Refresh</button>
    <button class="danger" onclick="signOut()">Sign out</button>
  </div>
</div>

<script>
const SB_URL='https://gtygqkqiqcfimpdfiaxk.supabase.co';
const SB_KEY='sb_publishable_e_QN8ug7AISzSDg5qeJe-A_4hBg_hIR';
let TOKEN   = localStorage.getItem('sb_token') || '';
let REFRESH = localStorage.getItem('sb_refresh') || '';

const $ = id => document.getElementById(id);
const show = (el,txt,ok) => { el.textContent=txt; el.className='msg '+(ok?'ok':'err'); };

const H = (auth) => ({ 'Content-Type':'application/json', apikey:SB_KEY,
  Authorization:'Bearer ' + (auth && TOKEN ? TOKEN : SB_KEY) });

/* ── auth ── */
async function signIn(){
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,
    { method:'POST', headers:{'Content-Type':'application/json', apikey:SB_KEY},
      body: JSON.stringify({ email:$('em').value.trim(), password:$('pw').value }) });
  const j = await r.json();
  if(j.access_token){ saveSession(j); localStorage.setItem('sb_email',$('em').value.trim()); openPanel(); }
  else show($('lmsg'), j.error_description || j.msg || 'Login failed', false);
}
function saveSession(j){
  TOKEN=j.access_token; REFRESH=j.refresh_token||REFRESH;
  localStorage.setItem('sb_token',TOKEN); localStorage.setItem('sb_refresh',REFRESH);
}
/* access tokens expire in ~1h — refresh silently so a long event never logs you out */
async function refreshSession(){
  if(!REFRESH) return false;
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,
    { method:'POST', headers:{'Content-Type':'application/json', apikey:SB_KEY},
      body: JSON.stringify({ refresh_token: REFRESH }) });
  const j = await r.json();
  if(j.access_token){ saveSession(j); return true; }
  return false;
}
/* any authed call: retry once after refreshing if the token went stale */
async function authFetch(url, opts={}){
  opts.headers = { ...(opts.headers||{}), apikey:SB_KEY, Authorization:'Bearer '+TOKEN };
  let r = await fetch(url, opts);
  if(r.status===401 && await refreshSession()){
    opts.headers.Authorization = 'Bearer '+TOKEN;
    r = await fetch(url, opts);
  }
  return r;
}
function signOut(){ localStorage.removeItem('sb_token'); localStorage.removeItem('sb_refresh');
  TOKEN=''; REFRESH=''; location.reload(); }
function openPanel(){
  $('login').style.display='none'; $('panel').style.display='block';
  $('who').textContent = 'Signed in as ' + (localStorage.getItem('sb_email')||'');
  loadList();
}

/* ── helpers ── */
function setTheme(b,g){ $('brand').value=b; $('gold').value=g; }
let photoData=null;
function pickPhoto(e){
  const f=e.target.files[0]; if(!f) return;
  photoData=f; const u=URL.createObjectURL(f);
  $('prev').src=u; $('prev').style.display='block';
}
$('slug').addEventListener('input',e=>{
  e.target.value=e.target.value.toLowerCase().replace(/[^a-z0-9-]/g,'');
  $('urlpreview').textContent='/'+(e.target.value||'slug');
});
function clearForm(){
  ['slug','name','role','wordmark','tagline','phone','phoneShow','email','website','websiteShow',
   'location','maps','instagram','facebook','linkedin','whatsapp','services','org'].forEach(i=>$(i).value='');
  $('photoPos').value='50% 30%'; $('servicesTitle').value='What We Do';
  setTheme('#0D1B2A','#C9A84C'); photoData=null;
  $('prev').style.display='none'; $('live').style.display='none'; $('msg').style.display='none';
}

/* ── save ── */
async function save(){
  const slug=$('slug').value.trim();
  if(!slug || !$('name').value.trim()) return show($('msg'),'Slug and name are required.',false);
  show($('msg'),'Saving…',true);

  let photoUrl = $('prev').dataset.url || '';
  if(photoData){
    const path = slug+'-'+Date.now()+'.'+(photoData.name.split('.').pop()||'jpg');
    const up = await authFetch(`${SB_URL}/storage/v1/object/photos/${path}`,
      { method:'POST', body: photoData });
    if(!up.ok){ const t=await up.text(); return show($('msg'),'Photo upload failed: '+t,false); }
    photoUrl = `${SB_URL}/storage/v1/object/public/photos/${path}`;
  }

  const data = {
    brand:$('brand').value.trim()||'#0D1B2A', gold:$('gold').value.trim()||'#C9A84C',
    logo:'', logoBlend:false, logoW:60,
    wordmark:$('wordmark').value.trim(), tagline:$('tagline').value.trim(),
    photo:photoUrl, photoPos:$('photoPos').value.trim()||'50% 30%',
    name:$('name').value.trim(), role:$('role').value.trim(),
    phone:$('phone').value.trim(), phoneShow:$('phoneShow').value.trim()||$('phone').value.trim(),
    email:$('email').value.trim(),
    website:$('website').value.trim(), websiteShow:$('websiteShow').value.trim(),
    location:$('location').value.trim(), maps:$('maps').value.trim(),
    instagram:$('instagram').value.trim(), facebook:$('facebook').value.trim(),
    linkedin:$('linkedin').value.trim(), whatsapp:$('whatsapp').value.trim(),
    servicesTitle:$('servicesTitle').value.trim()||'What We Do',
    services:$('services').value.split('\n').map(s=>s.trim()).filter(Boolean),
    pdf:'', pdfLabel:'View Brochure', org:$('org').value.trim(), ga:''
  };

  const r = await authFetch(`${SB_URL}/rest/v1/cards?on_conflict=slug`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', Prefer:'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify({ slug, data, updated_at:new Date().toISOString() })
  });
  if(!r.ok){ const t=await r.text(); return show($('msg'),'Save failed: '+t,false); }

  const url = location.origin + '/' + slug;
  show($('msg'),'Saved! Card is live.',true);
  $('live').style.display='block';
  $('liveurl').textContent=url; $('liveurl').href=url;
  $('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data='+encodeURIComponent(url);
  loadList();
}

/* ── list + edit ── */
async function loadList(){
  const r = await fetch(`${SB_URL}/rest/v1/cards?select=slug,data&order=updated_at.desc`,{headers:H(false)});
  const j = await r.json();
  $('list').innerHTML = (Array.isArray(j)&&j.length? j.map(c=>
    `<div class="row"><div class="nm">${(c.data&&c.data.name)||c.slug}<div class="sl">/${c.slug}</div></div>
     <a href="#" onclick="edit('${c.slug}');return false">Edit</a>
     <a href="/${c.slug}" target="_blank">Open</a></div>`).join('') : '<p class="hint">No cards yet.</p>');
}
async function edit(slug){
  const r = await fetch(`${SB_URL}/rest/v1/cards?slug=eq.${slug}&select=data`,{headers:H(false)});
  const j = await r.json(); const d = j[0] && j[0].data; if(!d) return;
  $('slug').value=slug; $('urlpreview').textContent='/'+slug;
  ['name','role','brand','gold','wordmark','tagline','photoPos','phone','phoneShow','email',
   'website','websiteShow','location','maps','instagram','facebook','linkedin','whatsapp',
   'servicesTitle','org'].forEach(k=>{ if($(k)) $(k).value = d[k]||''; });
  $('services').value=(d.services||[]).join('\n');
  photoData=null;
  if(d.photo){ $('prev').src=d.photo; $('prev').dataset.url=d.photo; $('prev').style.display='block'; }
  else { $('prev').style.display='none'; $('prev').dataset.url=''; }
  window.scrollTo({top:0,behavior:'smooth'});
  show($('msg'),'Editing '+slug,true);
}

/* remember the email so the login screen is effectively just a passcode */
$('em').value = localStorage.getItem('sb_email') || '';
if(TOKEN){ openPanel(); refreshSession(); }
</script>
</body>
</html>
